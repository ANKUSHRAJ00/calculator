<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>

      <div class="outer-box">
        <div class="screen"></div>
        <div class="buttons">
          
          <p>

            <button onclick="
              calculation += 1;
              updateScreen();
              console.log(calculation);
              ">1</button>

            <button onclick="
            calculation += 2;
            updateScreen();
            console.log(calculation);
            ">2</button>

            <button onclick="
            calculation += 3;
            updateScreen();
            console.log(calculation);
            ">3</button>

            <button onclick="
            calculation += '/';
            updateScreen();
            console.log(calculation);
            ">/</button>

          </p>

          <p>

            <button onclick="
              calculation += 4;
              updateScreen();
              console.log(calculation);
              ">4</button>

            <button onclick="
            calculation += 5;
            updateScreen();
            console.log(calculation);
            ">5</button>

            <button onclick="
            calculation += 6;
            updateScreen();
            console.log(calculation);
            ">6</button>

            <button onclick="
            calculation += '*';
            updateScreen();
            console.log(calculation);
            ">*</button>

          </p>

          <p>

            <button onclick="
              calculation += 7;
              updateScreen();
              console.log(calculation);
              ">7</button>

            <button onclick="
              calculation += 8;
              updateScreen();
              console.log(calculation);
              ">8</button>

            <button onclick="
              calculation += 9;
              updateScreen();
              console.log(calculation);
              ">9</button>

            <button onclick="
            calculation += '-';
            updateScreen();
            console.log(calculation);
            ">-</button>
          </p>

          <p>
            <button onclick="
              calculation = '';
              updateScreen();
              console.log('cleared !');
              ">clear</button>

            <button onclick="
              calculation += 0;
              updateScreen();
              console.log(calculation);
              ">0</button>

            <button onclick="
            calculation = eval(calculation);
            updateScreen();
            console.log(calculation);
            ">=</button>

            <button onclick="
            calculation += '+';
            updateScreen();
            console.log(calculation);
            ">+</button>

          </p>
        </div>

      </div>

    </header>

    <script>
      let calculation = '';

      function updateScreen(){
        document.querySelector('.screen').innerText = calculation;
      }
    </script>
  
</body>
</html>
